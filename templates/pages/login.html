{{define "pages/login.html"}}<!DOCTYPE html>
<html lang="en">
<head>{{template "partials/head.html" .}}</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center">
  <div class="w-full max-w-sm px-4">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-500 rounded-2xl mb-4 shadow-lg shadow-emerald-500/30">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" stroke-width="2"/>
          <line x1="12" y1="3" x2="12" y2="6" stroke-width="2"/>
          <line x1="12" y1="18" x2="12" y2="21" stroke-width="2"/>
          <line x1="3" y1="12" x2="6" y2="12" stroke-width="2"/>
          <line x1="18" y1="12" x2="21" y2="12" stroke-width="2"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">Room9</h1>
      <p class="text-slate-400 text-sm mt-1">Billiard Point of Sale</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800 rounded-2xl p-8 shadow-2xl border border-slate-700">
      {{if .Error}}
      <div class="mb-5 flex items-center gap-2 px-4 py-3 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {{.Error}}
      </div>
      {{end}}

      <form method="POST" action="/login" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
          <input type="text" name="username" required autofocus
            class="w-full px-4 py-3 bg-slate-700 border border-slate-600 text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent placeholder-slate-500 text-sm"
            placeholder="Enter your username"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
          <input type="password" name="password" required
            class="w-full px-4 py-3 bg-slate-700 border border-slate-600 text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent placeholder-slate-500 text-sm"
            placeholder="Enter your password"/>
        </div>
        <button type="submit"
          class="w-full bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-emerald-500/20 text-sm">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-600 mt-6">Default: admin / admin123</p>
  </div>
</body>
</html>{{end}}
