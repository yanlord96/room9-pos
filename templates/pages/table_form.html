{{define "pages/table_form.html"}}<!DOCTYPE html>
<html lang="en">
<head>{{template "partials/head.html" .}}</head>
<body class="bg-gray-100 min-h-screen">
{{template "partials/nav.html" .}}
<div class="max-w-lg mx-auto px-4 py-8">
  <div class="mb-6">
    <a href="/tables" class="text-sm text-gray-500 hover:text-gray-700">← Back to Tables</a>
    <h2 class="text-2xl font-bold text-gray-900 mt-2">{{.Title}}</h2>
  </div>

  {{if .Error}}
  <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">{{.Error}}</div>
  {{end}}

  <div class="bg-white rounded-xl shadow p-6">
    <form method="POST" action="{{.Action}}" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Table Name <span class="text-red-500">*</span></label>
        <input type="text" name="name" required
          value="{{if .Table}}{{.Table.Name}}{{end}}"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
          placeholder="e.g. Table 1"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Hourly Rate (Rp) <span class="text-red-500">*</span></label>
        <input type="number" name="hourly_rate" required min="0" step="1000"
          value="{{if .Table}}{{printf "%.0f" .Table.HourlyRate}}{{end}}"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
          placeholder="e.g. 30000"/>
      </div>
      {{if .Table}}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
        <select name="status"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 bg-white">
          <option value="available" {{if eq .Table.Status "available"}}selected{{end}}>Available</option>
          <option value="maintenance" {{if eq .Table.Status "maintenance"}}selected{{end}}>Maintenance</option>
        </select>
        <p class="text-xs text-gray-400 mt-1">Status changes to "occupied" automatically when booked.</p>
      </div>
      {{end}}
      <div class="flex gap-3 pt-2">
        <button type="submit"
          class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition">
          Save Table
        </button>
        <a href="/tables" class="flex-1 text-center py-2 rounded-lg border border-gray-300 hover:bg-gray-50 transition text-gray-700">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
</body>
</html>{{end}}
