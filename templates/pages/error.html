{{define "pages/error.html"}}<!DOCTYPE html>
<html lang="en">
<head>{{template "partials/head.html" .}}</head>
<body class="bg-gray-100 min-h-screen">
{{if .User}}{{template "partials/nav.html" .}}{{end}}
<div class="max-w-lg mx-auto px-4 py-20 text-center">
  <p class="text-6xl font-black text-gray-300 mb-4">!</p>
  <h2 class="text-2xl font-bold text-gray-800 mb-2">{{if .Title}}{{.Title}}{{else}}Error{{end}}</h2>
  <p class="text-gray-500 mb-6">{{.Message}}</p>
  <a href="/" class="inline-block bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium transition">
    Back to Dashboard
  </a>
</div>
</body>
</html>{{end}}
